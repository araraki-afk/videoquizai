services:

  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: videoquiz_db
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-videoquiz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-videoquiz_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-videoquiz} -d ${POSTGRES_DB:-videoquiz_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: videoquiz_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  # ── Whisper Microservice ───────────────────────────────────────────────
  #does not depend on db, so starts immediately, but will retry requests until db is ready
  whisper:
    build:
      context: ./whisper_service
      dockerfile: Dockerfile
    container_name: videoquiz_whisper
    restart: unless-stopped
    environment:
      WHISPER_MODEL: small
    volumes:
      - whisper_models:/root/.cache/huggingface #cache between runs
      - media_data:/backend/media #shared volume for media files
    ports:
      - "8001:8001"  

  # ── FastAPI ───────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: videoquiz_api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://videoquiz:030205Bd@db:5432/videoquiz_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/backend
      - media_data:/backend/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ─────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: videoquiz_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://videoquiz:030205Bd@db:5432/videoquiz_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/backend
      - media_data:/backend/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2

  # ── Flower ────────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: videoquiz_flower
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker
    command: celery -A tasks.celery_app flower --port=5555

  # ── pgAdmin ───────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: videoquiz_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
  media_data:
  whisper_models: